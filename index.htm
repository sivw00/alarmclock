<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Dual-Ring Alarm Picker - Working</title>
<style>
:root {
  --size: 360px;
  --ring-stroke: 25;
  --inner-color: #7c5cff;
  --outer-color: #22c3a6;
  --arrow: #fff;
  --bg: #0f1216;
  --fg: #e7eaee;
  --muted: #b4bdc6;
}

body {margin:0;background:var(--bg);color:var(--fg);display:grid;place-items:center;height:100vh;font:16px/1.3 system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;}
.picker {display:grid;gap:16px;align-items:center;justify-items:center;}
.readout {font-weight:700;font-size:1.6rem;letter-spacing:0.5px;}
.note {color:var(--muted);font-size:0.875rem;}
.dial {width:min(92vw,var(--size));height:auto;touch-action:none;user-select:none;}
.arrow {fill:var(--arrow);opacity:0.9;}
.ring-bg {fill:none;stroke:rgba(255,255,255,0.06);stroke-width:var(--ring-stroke);}
.ring-outline {fill:none;stroke-width:var(--ring-stroke);stroke-linecap:round;}
.ring-outline.hours {stroke:var(--inner-color);}
.ring-outline.minutes {stroke:var(--outer-color);}
text {font:600 14px system-ui;fill:#e9edf2;paint-order:stroke;stroke:rgba(15,18,22,0.35);stroke-width:3px;}
.tick text {text-anchor:middle;dominant-baseline:middle;}
.interactive {cursor:grab;}
.dragging {cursor:grabbing;}
</style>
</head>
<body>

<div class="picker">
  <div class="readout" id="readout">Set alarm: 07:30</div>
  <svg class="dial interactive" id="dial" viewBox="0 0 360 360">
    <!-- Background rings -->
    <circle cx="180" cy="180" r="140" class="ring-bg"></circle>
    <circle cx="180" cy="180" r="96" class="ring-bg"></circle>

    <!-- OUTER arrow (minutes) -->
    <g transform="translate(360,180)">
      <polygon class="arrow" points="0,-10 0,10 -18,0" />
    </g>
    <!-- INNER arrow (hours) -->
    <g transform="translate(235,180)">
      <polygon class="arrow" points="0,-10 0,10 18,0" />
    </g>

    <!-- Rings -->
    <g id="minuteRing" class="ring-outline minutes"></g>
    <g id="hourRing" class="ring-outline hours"></g>
  </svg>

  <div class="note">Drag outer ring for minutes (5-min steps). Drag inner ring for hours.</div>
</div>

<script>
(() => {
const cx=180,cy=182,rMinutes=140,rHours=96;
const MINUTE_STEP=5,MINUTE_DIVS=12,HOUR_DIVS=12;
let hour=12,minute=0;
let activeRing=null,isDragging=false,startAngle=0;
let rotation={hours:0,minutes:0};

const dial=document.getElementById('dial');
const hourRing=document.getElementById('hourRing');
const minuteRing=document.getElementById('minuteRing');
const readout=document.getElementById('readout');

// Build each tick as <g><text></text></g> with counter-rotation
function buildLabels(parent,count,radius,labelFn){
  for(let i=0;i<count;i++){
    const angle=(i/count)*360; // 0° at right
    const rad=angle*Math.PI/180;

    const x=cx+radius*Math.cos(rad);
    const y=cy+radius*Math.sin(rad);

    const g=document.createElementNS("http://www.w3.org/2000/svg","g");
    g.setAttribute("class","tick");

    const t=document.createElementNS("http://www.w3.org/2000/svg","text");
    t.textContent=labelFn(i);
    t.setAttribute("x",x);
    t.setAttribute("y",y);

    g.appendChild(t);
    parent.appendChild(g);
  }
}

// Hours 1-12
buildLabels(hourRing,HOUR_DIVS,rHours,i=>i===0?12:i);
// Minutes 0-55 step 5
buildLabels(minuteRing,MINUTE_DIVS,rMinutes,i=>i*MINUTE_STEP);

// Compute pointer angle relative to center
function pointerAngle(evt){
  const pt=dial.createSVGPoint();
  pt.x=evt.clientX; pt.y=evt.clientY;
  const svgP=pt.matrixTransform(dial.getScreenCTM().inverse());
  return Math.atan2(svgP.y-cy, svgP.x-cx)*180/Math.PI;
}

// Update visuals
function updateVisual(){
  hourRing.setAttribute("transform",`rotate(${rotation.hours} ${cx} ${cy})`);
  minuteRing.setAttribute("transform",`rotate(${rotation.minutes} ${cx} ${cy})`);

  // Counter-rotate each number around its own center to stay upright
  hourRing.querySelectorAll(".tick text").forEach(t=>{
    t.setAttribute("transform",`rotate(${-rotation.hours} ${t.getAttribute("x")} ${t.getAttribute("y")})`);
  });
  minuteRing.querySelectorAll(".tick text").forEach(t=>{
    t.setAttribute("transform",`rotate(${-rotation.minutes} ${t.getAttribute("x")} ${t.getAttribute("y")})`);
  });

  readout.textContent=`Set alarm: ${String(hour).padStart(2,'0')}:${String(minute).padStart(2,'0')}`;
}

// Snap rotation to nearest step
function snap(type){
  const divisions = (type === "hours") ? HOUR_DIVS : MINUTE_DIVS;
  const step = 360 / divisions;

  // Snap rotation visually
  rotation[type] = Math.round(rotation[type] / step) * step;

  // Convert rotation to index (clockwise = increase value)
  const index = (
    divisions - Math.round(norm(rotation[type]) / step)
  ) % divisions;

  if(type === "hours"){
    hour = index === 0 ? 12 : index;
  } else {
    minute = index * MINUTE_STEP;
  }

  updateVisual();
}

// Detect which ring
function detectRing(evt){
  const pt=dial.createSVGPoint();
  pt.x=evt.clientX; pt.y=evt.clientY;
  const svgP=pt.matrixTransform(dial.getScreenCTM().inverse());
  const dist=Math.hypot(svgP.x-cx, svgP.y-cy);
  const band=20;
  if(dist>rMinutes-band && dist<rMinutes+band) return "minutes";
  if(dist>rHours-band && dist<rHours+band) return "hours";
  return null;
}

// Pointer events
dial.addEventListener("pointerdown", e=>{
  activeRing=detectRing(e);
  if(!activeRing) return;
  isDragging=true;
  startAngle=pointerAngle(e);
  dial.classList.add("dragging");
  dial.setPointerCapture(e.pointerId);
});

dial.addEventListener("pointermove", e=>{
  if(!isDragging||!activeRing) return;
  const angle=pointerAngle(e);
  const delta=angle-startAngle;
  rotation[activeRing]+=delta;
  startAngle=angle;
  updateVisual();
});

function release(e){
  if(!isDragging) return;
  snap(activeRing);
  isDragging=false;
  activeRing=null;
  dial.classList.remove("dragging");
  try{dial.releasePointerCapture(e.pointerId);}catch{}
}

dial.addEventListener("pointerup", release);
dial.addEventListener("pointercancel", release);
dial.addEventListener("pointerleave", release);

// Initialize
rotation.hours=360*(hour%12)/12;
rotation.minutes=360*(minute/60);
updateVisual();

function norm(deg){ return ((deg%360)+360)%360; }
})();
</script>
</body>

</html>
