<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Concentric Alarm Clock - Visual Update</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --accent-color: #38bdf8;
            --text-color: #ffffff;
            --ring-outer: rgba(56, 189, 248, 0.2);
            --ring-inner: rgba(56, 189, 248, 0.2);
            --glow: 0 0 15px rgba(56, 189, 248, 0.6);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            touch-action: none;
        }

        .time-display {
            font-size: 4rem;
            margin-bottom: 20px;
            font-weight: 800;
            color: var(--accent-color);
            text-shadow: var(--glow);
        }

        .clock-container {
            position: relative;
            width: 350px;
            height: 350px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Triangle Pointers positioned as requested */
        .pointers {
            position: absolute;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5px;
            box-sizing: border-box;
            z-index: 10;
            pointer-events: none;
        }

        /* Outside arrow pointing in (left) */
        .arrow-outer {
            position: absolute;
            right: -25px;
            width: 0; 
            height: 0; 
            border-top: 12px solid transparent;
            border-bottom: 12px solid transparent;
            border-right: 18px solid var(--accent-color);
            filter: drop-shadow(0 0 5px var(--accent-color));
        }

        /* Inside arrow pointing out (right) */
        .arrow-inner {
            position: absolute;
            left: 205px; /* Adjusted for the inner ring gap */
            width: 0; 
            height: 0; 
            border-top: 12px solid transparent;
            border-bottom: 12px solid transparent;
            border-left: 18px solid var(--accent-color);
            filter: drop-shadow(0 0 5px var(--accent-color));
        }

        .ring {
            position: absolute;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: grab;
            transition: transform 0.1s linear;
            user-select: none;
            background: rgba(255, 255, 255, 0.02);
        }

        .ring:active { cursor: grabbing; }

        #outer-ring {
            width: 320px;
            height: 320px;
            border: 4px solid var(--ring-outer);
            box-shadow: inset 0 0 20px 
        }

        #inner-ring {
            width: 200px;
            height: 200px;
            border: 4px solid var(--ring-inner);
            box-shadow: inset 0 0 15px rgba(0,0,0,1);
        }

        .number {
            position: absolute;
            width: 30px;
            height: 30px;
            text-align: center;
            line-height: 30px;
            font-weight: 600;
            font-size: 1.25rem;
            color: #94a3b8;
        }

        .helper-text {
            margin-top: 40px;
            color: #475569;
            font-size: 0.8rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="time-display" id="display">12:00</div>

    <div class="clock-container" id="clock-boundary">
        <div class="pointers">
            <div class="arrow-inner"></div> <div class="arrow-outer"></div> </div>

        <div id="outer-ring" class="ring"></div>
        <div id="inner-ring" class="ring"></div>
    </div>

    <div class="helper-text">Drag rings to align time with arrows</div>

    <script>
        const outerRing = document.getElementById('outer-ring');
        const innerRing = document.getElementById('inner-ring');
        const display = document.getElementById('display');

        let state = { hour: 12, minute: 0 };

        function createNumbers(ring, count, step, radius) {
            for (let i = 0; i < count; i++) {
                const num = document.createElement('div');
                num.className = 'number';
                const val = i * step;
                num.innerText = ring.id === 'inner-ring' ? (i === 0 ? 12 : i) : (val < 10 ? '0'+val : val);
                
                const angle = (i * (360 / count)) * (Math.PI / 180);
                const x = Math.cos(angle) * radius;
                const y = Math.sin(angle) * radius;
                
                num.style.left = `calc(50% + ${x}px - 15px)`;
                num.style.top = `calc(50% + ${y}px - 15px)`;
                ring.appendChild(num);
            }
        }

        createNumbers(outerRing, 12, 5, 130);
        createNumbers(innerRing, 12, 1, 75);

        function handleRotation(e, ring, isOuter) {
            const rect = ring.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;

            let angle = Math.atan2(clientY - centerY, clientX - centerX) * (180 / Math.PI);
            ring.style.transform = `rotate(${angle}deg)`;
            
            const numbers = ring.querySelectorAll('.number');
            numbers.forEach(n => n.style.transform = `rotate(${-angle}deg)`);

            // Logic: find which number is at 0 degrees (the right side)
            let normalized = (angle < 0) ? angle + 360 : angle;
            let slice = Math.round((360 - normalized) / 30) % 12;
            
            if (isOuter) {
                state.minute = (slice * 5) % 60;
            } else {
                let hourVal = slice === 0 ? 12 : slice;
                state.hour = hourVal;
            }
            updateDisplay();
        }

        function updateDisplay() {
            const m = state.minute < 10 ? '0' + state.minute : state.minute;
            display.innerText = `${state.hour}:${m}`;
        }

        function setupRing(ring, isOuter) {
            let isDragging = false;
            let lastAngle = 0;

            const start = () => isDragging = true;
            const stop = () => {
                isDragging = false;
                const currentRotation = ring.style.transform.match(/rotate\((.*)deg\)/);
                if (currentRotation) {
                    let angle = parseFloat(currentRotation[1]);
                    let snapped = Math.round(angle / 30) * 30;
                    ring.style.transition = 'transform 0.2s ease-out';
                    ring.style.transform = `rotate(${snapped}deg)`;
                    ring.querySelectorAll('.number').forEach(n => {
                        n.style.transition = 'transform 0.2s';
                        n.style.transform = `rotate(${-snapped}deg)`;
                    });
                    setTimeout(() => ring.style.transition = 'none', 200);
                }
            };

            const move = (e) => { if (isDragging) handleRotation(e, ring, isOuter); };

            ring.addEventListener('mousedown', start);
            window.addEventListener('mousemove', move);
            window.addEventListener('mouseup', stop);
            ring.addEventListener('touchstart', start);
            window.addEventListener('touchmove', move);
            window.addEventListener('touchend', stop);
        }

        setupRing(outerRing, true);
        setupRing(innerRing, false);
    </script>
</body>
</html>
